<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300"><rect width="100%" height="100%" fill="#0d1117" rx="12"/><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#58a6ff" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#a371f7" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3fb950" /></marker><style>@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"); .text-base { font-family: "Inter", system-ui, sans-serif; fill: #c9d1d9; font-size: 14px; } .text-title { font-family: "Inter", system-ui, sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; } .text-sub { font-family: "Inter", system-ui, sans-serif; font-size: 12px; fill: #8b949e; } .box { fill: #161b22; stroke: #30363d; stroke-width: 2px; rx: 8px; } .box-purple { fill: #161b22; stroke: #a371f7; stroke-width: 2px; rx: 8px; } .box-green { fill: #161b22; stroke: #3fb950; stroke-width: 2px; rx: 8px; } .path-line { stroke: #58a6ff; stroke-width: 2px; fill: none; marker-end: url(#arrow); } .path-purple { stroke: #a371f7; stroke-width: 2px; fill: none; marker-end: url(#arrow-purple); } .path-green { stroke: #3fb950; stroke-width: 2px; fill: none; marker-end: url(#arrow-green); }</style></defs><text x="400" y="60" text-anchor="middle" class="text-title">AI-Assisted QA Workflow</text><rect x="40" y="120" width="120" height="70" class="box-purple" /><text x="100" y="152" text-anchor="middle" class="text-base" font-weight="600">LLM Engine</text><text x="100" y="172" text-anchor="middle" class="text-sub">Gemini / Claude</text><path d="M 160 155 L 200 155" class="path-purple" /><rect x="210" y="120" width="120" height="70" c