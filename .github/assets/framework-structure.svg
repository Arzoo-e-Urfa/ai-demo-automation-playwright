<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400"><rect width="100%" height="100%" fill="#0d1117" rx="12"/><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#58a6ff" /></marker><marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#a371f7" /></marker><marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3fb950" /></marker><style>@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"); .text-base { font-family: "Inter", system-ui, sans-serif; fill: #c9d1d9; font-size: 14px; } .text-title { font-family: "Inter", system-ui, sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; } .text-sub { font-family: "Inter", system-ui, sans-serif; font-size: 12px; fill: #8b949e; } .box { fill: #161b22; stroke: #30363d; stroke-width: 2px; rx: 8px; } .box-purple { fill: #161b22; stroke: #a371f7; stroke-width: 2px; rx: 8px; } .box-green { fill: #161b22; stroke: #3fb950; stroke-width: 2px; rx: 8px; } .path-line { stroke: #58a6ff; stroke-width: 2px; fill: none; marker-end: url(#arrow); } .path-purple { stroke: #a371f7; stroke-width: 2px; fill: none; marker-end: url(#arrow-purple); } .path-green { stroke: #3fb950; stroke-width: 2px; fill: none; marker-end: url(#arrow-green); }</style></defs><text x="400" y="60" text-anchor="middle" class="text-title">Framework Structure</text><g transform="translate(150, 100)"><rect x="0" y="0" width="500" height="40" class="box-purple" /><text x="20" y="25" class="text-base" font-weight="600">📁 ai-demo-automation-playwright/</text><path d="M 30 40 L 30 250" stroke="#30363d" stroke-width="2" fill="none" /><path d="M 30 80 L 50 80" stroke="#30363d" stroke-width="2" fill="none" /><rect